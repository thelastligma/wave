    <script>
        let tabs = [{ id: 1, name: "Untitled Tab", content: "-- Wave interface is real." }];
        let activeTabId = 1;
        let editingTabId = null;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('wave-transparent', {
                base: 'vs-dark', inherit: true, rules: [],
                colors: {
                    'editor.background': '#00000000', 
                    'editor.lineHighlightBackground': '#00000000',
                    'editor.lineHighlightBorder': '#00000000',
                }
            });

            window.editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: tabs[0].content,
                language: 'lua',
                theme: 'wave-transparent',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                fontFamily: 'Inter, monospace',
                lineNumbers: 'on',
                roundedSelection: true,
                scrollBeyondLastLine: false,
                readOnly: false,
                cursorStyle: 'line',
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: true,
                smoothScrolling: true,
                renderWhitespace: 'none',
                scrollbar: { vertical: 'visible', horizontal: 'visible' } 
            });

            renderTabs();
        });

        function renderTabs() {
            const tabList = document.getElementById('tab-list');
            if (!tabList) return;
            tabList.innerHTML = '';

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab-item ${tab.id === activeTabId ? 'active' : 'inactive'}`;
                
                tabEl.onclick = () => { if(editingTabId !== tab.id) switchTab(tab.id); };
                tabEl.oncontextmenu = (e) => {
                    e.preventDefault();
                    startRename(tab.id);
                };

                if (editingTabId === tab.id) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'tab-rename-input';
                    input.value = tab.name;
                    input.maxLength = 15;
                    input.onblur = () => finishRename(tab.id, input.value);
                    input.onkeydown = (ev) => { if(ev.key === 'Enter') finishRename(tab.id, input.value); };
                    tabEl.appendChild(input);
                    setTimeout(() => input.focus(), 50);
                } else {
                    const textSpan = document.createElement('span');
                    textSpan.className = 'tab-text';
                    textSpan.textContent = tab.name;
                    tabEl.appendChild(textSpan);
                }

                const closeContainer = document.createElement('div');
                closeContainer.className = 'close-icon-container';
                closeContainer.innerHTML = `
                    <svg width="27" height="27" viewBox="0 0 27 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <mask id="mc_${tab.id}" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="27" height="27"><rect width="27" height="27" fill="#D9D9D9"/></mask>
                        <g mask="url(#mc_${tab.id})"><path d="M13.5012 15.0754L10.2198 18.366C10.0123 18.5723 9.74817 18.6754 9.42755 18.6754C9.10692 18.6754 8.84292 18.5723 8.63555 18.366C8.4293 18.1598 8.32617 17.8973 8.32617 17.5785C8.32617 17.2598 8.4293 16.9973 8.63555 16.791L11.9262 13.5004L8.63555 10.2472C8.4293 10.0396 8.32617 9.77551 8.32617 9.45489C8.32617 9.13426 8.4293 8.87027 8.63555 8.66289C8.8418 8.45664 9.1043 8.35352 9.42305 8.35352C9.7418 8.35352 10.0043 8.45664 10.2105 8.66289L13.5012 11.9535L16.7544 8.66289C16.962 8.45664 17.226 8.35352 17.5467 8.35352C17.8673 8.35352 18.1313 8.45664 18.3387 8.66289C18.5637 8.88789 18.6762 9.15508 18.6762 9.46445C18.6762 9.77383 18.5637 10.0316 18.3387 10.2379L15.048 13.5004L18.3387 16.7817C18.5449 16.9893 18.648 17.2534 18.648 17.574C18.648 17.8946 18.5449 18.1586 18.3387 18.366C18.1137 18.591 17.8465 18.7035 17.5371 18.7035C17.2277 18.7035 16.9699 18.591 16.7637 18.366L13.5012 15.0754Z" fill="white"/></g>
                    </svg>
                `;
                closeContainer.onclick = (e) => { e.stopPropagation(); closeTab(tab.id); };
                tabEl.appendChild(closeContainer);
                tabList.appendChild(tabEl);
            });
            
            const addBtn = document.createElement('div');
            addBtn.id = 'add-tab-btn';
            addBtn.innerHTML = document.getElementById('add-tab-btn-template').innerHTML;
            addBtn.onclick = addTab;
            tabList.appendChild(addBtn);
        }

        function startRename(id) {
            editingTabId = id;
            renderTabs();
        }

        function finishRename(id, newName) {
            if (newName.trim()) {
                const tab = tabs.find(t => t.id === id);
                if (tab) tab.name = newName.trim();
            }
            editingTabId = null;
            renderTabs();
        }

        function switchTab(id) {
            if (activeTabId === id) return;
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab) currentTab.content = window.editor.getValue();
            activeTabId = id;
            const newTab = tabs.find(t => t.id === id);
            if (window.editor && newTab) window.editor.setValue(newTab.content);
            renderTabs();
            scrollToActiveTab();
        }

        function addTab() {
            if (window.editor) {
                const currentTab = tabs.find(t => t.id === activeTabId);
                if (currentTab) currentTab.content = window.editor.getValue();
            }
            const newId = tabs.length > 0 ? Math.max(...tabs.map(t => t.id)) + 1 : 1;
            const newTab = { id: newId, name: "Untitled Tab", content: "-- Wave interface is real." };
            tabs.push(newTab);
            activeTabId = newId;
            if (window.editor) window.editor.setValue("-- Wave interface is real.");
            renderTabs();
            setTimeout(scrollToActiveTab, 50);
        }

        function closeTab(id) {
            if (tabs.length === 1) return;
            const index = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);
            if (activeTabId === id) {
                activeTabId = tabs[Math.max(0, index - 1)].id;
                if (window.editor) window.editor.setValue(tabs.find(t => t.id === activeTabId).content);
            }
            renderTabs();
        }

        function scrollToActiveTab() {
            const activeTab = document.querySelector('.tab-item.active');
            if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.closest('.monaco-editor')) return;
            
            const list = document.getElementById('tab-list');
            if (e.key === 'ArrowLeft') {
                list.scrollLeft -= 100;
            } else if (e.key === 'ArrowRight') {
                list.scrollLeft += 100;
            }
        });

        document.getElementById('scroll-left-btn').onclick = () => document.getElementById('tab-list').scrollLeft -= 150;
        document.getElementById('scroll-right-btn').onclick = () => document.getElementById('tab-list').scrollLeft += 150;

        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.onmousedown = () => {
                const inner = btn.querySelector('.btn-inner');
                if (inner) {
                    inner.classList.remove('animate-content-bounce');
                    void inner.offsetWidth;
                    inner.classList.add('animate-content-bounce');
                }
            };
        });

        const macStatusText = document.getElementById('mac-status-text');
        const macStatusDot = document.getElementById('mac-status-dot');

        function setMacStatus(attached, executorName) {
            const label = attached ? (executorName || 'Connected') : 'Disconnected';
            if (macStatusText) {
                macStatusText.textContent = label;
            }

            if (macStatusDot) {
                macStatusDot.style.background = attached ? 'rgba(113, 226, 160, 1)' : 'rgba(234,135,120,1)';
            }
        }

        async function refreshMacStatus() {
            const result = await window.electronAPI?.macStatus?.();
            setMacStatus(!!result?.attached, result?.executor);
        }

        if (window.electronAPI?.onMacStatus) {
            window.electronAPI.onMacStatus((payload) => {
                setMacStatus(!!payload?.attached, payload?.executor);
            });
        }

        if (window.electronAPI?.onMacMessage) {
            window.electronAPI.onMacMessage((payload) => {
                if (!payload) return;
                if (payload.kind === 'error') {
                    console.error('[MacSploit Error]', payload.message);
                } else {
                    console.log('[MacSploit Debug]', payload.message);
                }
            });
        }

        if (window.electronAPI?.onMacError) {
            window.electronAPI.onMacError((payload) => {
                console.error('[MacSploit Connection Error]', payload?.message || 'Unknown error');
                setMacStatus(false);
            });
        }

        if (window.electronAPI?.onMacClose) {
            window.electronAPI.onMacClose(() => {
                setMacStatus(false);
            });
        }

        document.querySelector('.v249_613').onclick = async () => {
            const script = window.editor ? window.editor.getValue() : '';
            if (!script.trim()) return;

            if (macStatusText) {
                macStatusText.textContent = 'Connecting...';
            }

            const result = await window.electronAPI?.macExecute?.(script);
            if (!result?.ok) {
                console.error('[MacSploit Execute Failed]', result?.error || 'Unknown error');
                setMacStatus(false);
                return;
            }

            setMacStatus(true, result?.executor || 'Connected');
            console.log('[MacSploit] Executed script.');
        };

        refreshMacStatus();
        setInterval(refreshMacStatus, 2000);

        document.querySelector('.v249_615').onclick = () => { if (window.editor) window.editor.setValue(''); };
    </script>
</body>
</html>
